name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux_x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            suffix: linux_aarch64
            use_cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: macos_x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: macos_aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: windows_x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux ARM)
        if: matrix.use_cross == true
        run: cargo install cross

      - name: Build with cross
        if: matrix.use_cross == true
        run: cross build --release --target ${{ matrix.target }} -p vortex --bin nexus

      - name: Build
        if: matrix.use_cross != true
        run: cargo build --release --target ${{ matrix.target }} -p vortex --bin nexus

      - name: Package
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          BIN=target/${{ matrix.target }}/release/nexus
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            BIN="${BIN}.exe"
          fi
          tar czf nexus_${VERSION}_${{ matrix.suffix }}.tar.gz -C "$(dirname "$BIN")" "$(basename "$BIN")"

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: nexus_*.tar.gz
